<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lap Tools — конвертер с превью</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0b0e14; color: #e2e8f0; }
    .drop-zone { border: 2px dashed #334155; transition: all 0.2s; background: #141a24; }
    .drop-zone.dragover { border-color: #818cf8; background: #1e2330; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.2s; }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .btn-primary:disabled { opacity: 0.4; transform: none; box-shadow: none; }
    .logo-gradient { background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .progress-bar { height: 4px; background: #1e293b; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.3s; }
    .preview-container { display: flex; gap: 16px; flex-wrap: wrap; }
    .preview-container > div { flex: 1; min-width: 250px; }
    video, canvas { border-radius: 16px; background: #000; width: 100%; max-height: 400px; }
    .modal { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
    .modal-card { background: #1e2430; border: 1px solid #334155; max-width: 600px; width: 100%; }
    select, input { background: #141a24; border: 1px solid #334155; color: #e2e8f0; border-radius: 12px; padding: 0.5rem 1rem; }
    select:focus, input:focus { outline: 2px solid #6366f1; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 6px; }
    .info-item { background: #141a24; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; border: 1px solid #1e293b; }
    .info-item span { color: #a5b4fc; font-weight: 600; }
  </style>
</head>
<body>
<div class="max-w-6xl mx-auto px-4 py-6">
  <!-- Шапка -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-indigo-900/40 flex items-center justify-center text-2xl">⚡</div>
      <div>
        <h1 class="text-3xl font-bold logo-gradient">Lap Tools</h1>
        <p class="text-sm text-gray-400 -mt-0.5">от Lap.comp — превью кадрирования</p>
      </div>
    </div>
    <button id="settingsBtn" class="text-gray-400 hover:text-white p-2 rounded-full hover:bg-gray-700/30 transition text-xl">⚙️</button>
  </div>

  <!-- Зона загрузки -->
  <div class="drop-zone rounded-2xl p-8 text-center cursor-pointer transition" id="dropZone">
    <div class="text-5xl mb-3">📂</div>
    <p class="text-gray-300 font-medium">Перетащите файл или <span class="text-indigo-400 underline" id="chooseBtn">выберите</span></p>
    <p class="text-sm text-gray-500 mt-1" id="fileName">Файл не выбран</p>
    <input type="file" id="fileInput" class="hidden" accept="video/*,audio/*" />
  </div>

  <!-- Информация о файле -->
  <div id="fileInfo" class="hidden info-grid text-xs text-gray-400 mt-4">
    <div class="info-item">📁 Формат: <span id="infoFormat">—</span></div>
    <div class="info-item">📐 Размер: <span id="infoSize">—</span></div>
    <div class="info-item">⏱ Длит.: <span id="infoDuration">—</span></div>
    <div class="info-item">🖥 Разр.: <span id="infoResolution">—</span></div>
    <div class="info-item">🎵 Кодек: <span id="infoAudioCodec">—</span></div>
    <div class="info-item">🎛 Частота: <span id="infoSampleRate">—</span> Гц</div>
  </div>

  <!-- Превью: исходник и кадрирование -->
  <div id="previewSection" class="hidden mt-4">
    <div class="preview-container">
      <div>
        <p class="text-xs text-gray-400 mb-1">📹 Исходное видео</p>
        <video id="sourceVideo" controls muted class="w-full rounded-xl bg-black"></video>
      </div>
      <div>
        <p class="text-xs text-gray-400 mb-1">✂️ Результат кадрирования</p>
        <canvas id="cropPreview" class="w-full rounded-xl bg-black"></canvas>
      </div>
    </div>
    <div class="grid grid-cols-4 gap-3 mt-3">
      <div><label class="text-xs text-gray-400">X</label><input type="number" id="cropX" value="0" step="1" class="w-full" /></div>
      <div><label class="text-xs text-gray-400">Y</label><input type="number" id="cropY" value="0" step="1" class="w-full" /></div>
      <div><label class="text-xs text-gray-400">Ширина</label><input type="number" id="cropW" step="1" class="w-full" /></div>
      <div><label class="text-xs text-gray-400">Высота</label><input type="number" id="cropH" step="1" class="w-full" /></div>
    </div>
  </div>

  <!-- Кнопка конвертации -->
  <button id="convertBtn" class="btn-primary w-full text-white font-semibold py-3 rounded-2xl mt-6 transition disabled:opacity-50 disabled:cursor-not-allowed text-lg" disabled>
    🚀 Конвертировать
  </button>

  <!-- Прогресс и статус -->
  <div id="progressWrap" class="hidden progress-bar mt-3">
    <div id="progressFill" class="progress-fill"></div>
  </div>
  <p id="status" class="text-center text-sm text-gray-400 min-h-[1.5rem] mt-1"></p>

  <!-- Модалка настроек -->
  <div id="settingsModal" class="modal fixed inset-0 flex items-center justify-center p-4 hidden z-50">
    <div class="modal-card rounded-3xl p-6 space-y-5 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold text-white">⚙️ Настройки</h2>
        <button id="closeModal" class="text-gray-400 hover:text-white text-2xl">&times;</button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-gray-300">Режим</label>
          <select id="modeSelect" class="w-full">
            <option value="video">🎬 Видео → Видео</option>
            <option value="audio">🎵 Видео → Аудио</option>
            <option value="audio2audio">🎵 Аудио → Аудио</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-300">Выходной формат</label>
          <select id="outFormat" class="w-full">
            <!-- динамически -->
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-300">Аудиокодек</label>
          <select id="audioCodec" class="w-full">
            <option value="aac">AAC</option>
            <option value="mp3">MP3</option>
            <option value="opus">Opus</option>
            <option value="ac3">AC-3</option>
            <option value="flac">FLAC</option>
            <option value="copy">Копировать</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-300">Частота дискретизации (Гц)</label>
          <select id="sampleRate" class="w-full">
            <option value="16000">16 000</option>
            <option value="22050">22 050</option>
            <option value="44100">44 100</option>
            <option value="48000" selected>48 000</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-300">Аудиобитрейт (kbps)</label>
          <select id="audioBitrate" class="w-full">
            <option value="128">128</option>
            <option value="192">192</option>
            <option value="256">256</option>
            <option value="320">320</option>
          </select>
        </div>
      </div>
      <button id="saveSettings" class="btn-primary w-full text-white font-semibold py-2.5 rounded-xl transition">Сохранить</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "@ffmpeg/ffmpeg": "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js",
    "@ffmpeg/core": "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/index.js"
  }
}
</script>

<script type="module">
import { FFmpeg } from '@ffmpeg/ffmpeg';

// DOM
const dropZone = document.getElementById('dropZone');
const chooseBtn = document.getElementById('chooseBtn');
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const fileInfo = document.getElementById('fileInfo');
const previewSection = document.getElementById('previewSection');
const sourceVideo = document.getElementById('sourceVideo');
const cropPreview = document.getElementById('cropPreview');
const cropX = document.getElementById('cropX');
const cropY = document.getElementById('cropY');
const cropW = document.getElementById('cropW');
const cropH = document.getElementById('cropH');
const convertBtn = document.getElementById('convertBtn');
const status = document.getElementById('status');
const progressFill = document.getElementById('progressFill');
const progressWrap = document.getElementById('progressWrap');
const settingsBtn = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const closeModal = document.getElementById('closeModal');
const saveSettings = document.getElementById('saveSettings');
const modeSelect = document.getElementById('modeSelect');
const outFormat = document.getElementById('outFormat');
const audioCodec = document.getElementById('audioCodec');
const sampleRate = document.getElementById('sampleRate');
const audioBitrate = document.getElementById('audioBitrate');

let selectedFile = null;
let videoWidth = 0, videoHeight = 0;

// --- Форматы ---
const formatMap = {
  video: {
    mp4: { ext: 'mp4', videoCodec: 'libx264' },
    webm: { ext: 'webm', videoCodec: 'libvpx-vp9' },
    avi: { ext: 'avi', videoCodec: 'mpeg4' },
    mov: { ext: 'mov', videoCodec: 'prores' },
    mkv: { ext: 'mkv', videoCodec: 'libx264' },
  },
  audio: {
    mp3: { ext: 'mp3' },
    aac: { ext: 'aac' },
    opus: { ext: 'opus' },
    flac: { ext: 'flac' },
    wav: { ext: 'wav' },
  }
};

function updateFormatOptions(mode) {
  outFormat.innerHTML = '';
  const formats = mode === 'video' ? formatMap.video : formatMap.audio;
  Object.keys(formats).forEach(key => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = key.toUpperCase();
    outFormat.appendChild(opt);
  });
}
updateFormatOptions('video');

// --- Модалка ---
settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
closeModal.addEventListener('click', () => settingsModal.classList.add('hidden'));
settingsModal.addEventListener('click', (e) => {
  if (e.target === settingsModal) settingsModal.classList.add('hidden');
});
saveSettings.addEventListener('click', () => {
  settingsModal.classList.add('hidden');
  const mode = modeSelect.value;
  updateFormatOptions(mode);
});

// --- Загрузка файла ---
function openFileDialog() { fileInput.click(); }
dropZone.addEventListener('click', openFileDialog);
chooseBtn.addEventListener('click', (e) => { e.stopPropagation(); openFileDialog(); });
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  fileName.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
  status.textContent = '';
  convertBtn.disabled = false;
  fileInfo.classList.remove('hidden');
  const ext = file.name.split('.').pop().toLowerCase();
  document.getElementById('infoFormat').textContent = ext;
  document.getElementById('infoSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';

  if (file.type.startsWith('video/')) {
    const url = URL.createObjectURL(file);
    sourceVideo.src = url;
    sourceVideo.onloadedmetadata = () => {
      videoWidth = sourceVideo.videoWidth;
      videoHeight = sourceVideo.videoHeight;
      document.getElementById('infoResolution').textContent = `${videoWidth}×${videoHeight}`;
      document.getElementById('infoDuration').textContent = sourceVideo.duration.toFixed(1) + ' с';
      // автозаполнение ширины/высоты для кадрирования
      cropW.value = videoWidth;
      cropH.value = videoHeight;
      cropX.value = 0;
      cropY.value = 0;
      previewSection.classList.remove('hidden');
      updateCropPreview();
    };
    sourceVideo.onerror = () => {
      document.getElementById('infoDuration').textContent = '—';
    };
    // аудио параметры
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const audioData = await ctx.decodeAudioData(e.target.result);
        document.getElementById('infoSampleRate').textContent = audioData.sampleRate;
      } catch {}
    };
    reader.readAsArrayBuffer(file);
  } else if (file.type.startsWith('audio/')) {
    document.getElementById('infoResolution').textContent = '—';
    document.getElementById('infoDuration').textContent = '—';
    previewSection.classList.add('hidden');
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const audioData = await ctx.decodeAudioData(e.target.result);
        document.getElementById('infoSampleRate').textContent = audioData.sampleRate;
        document.getElementById('infoDuration').textContent = audioData.duration.toFixed(1) + ' с';
      } catch {}
    };
    reader.readAsArrayBuffer(file);
  }
}

// --- Обновление превью кадрирования ---
function updateCropPreview() {
  const canvas = cropPreview;
  const ctx = canvas.getContext('2d');
  const vw = videoWidth;
  const vh = videoHeight;
  if (!vw || !vh) return;
  let x = parseInt(cropX.value) || 0;
  let y = parseInt(cropY.value) || 0;
  let w = parseInt(cropW.value) || vw;
  let h = parseInt(cropH.value) || vh;
  // ограничения
  x = Math.max(0, Math.min(x, vw - 1));
  y = Math.max(0, Math.min(y, vh - 1));
  w = Math.max(1, Math.min(w, vw - x));
  h = Math.max(1, Math.min(h, vh - y));
  // рисуем обрезанную область
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(sourceVideo, x, y, w, h, 0, 0, w, h);
}

// Подписка на изменение полей
[cropX, cropY, cropW, cropH].forEach(el => {
  el.addEventListener('input', updateCropPreview);
});
sourceVideo.addEventListener('timeupdate', updateCropPreview);
sourceVideo.addEventListener('loadeddata', updateCropPreview);

// --- Конвертация ---
convertBtn.addEventListener('click', async () => {
  if (!selectedFile) {
    status.textContent = '⚠️ Сначала выберите файл.';
    return;
  }
  convertBtn.disabled = true;
  status.textContent = '⏳ Загрузка FFmpeg...';
  progressWrap.classList.remove('hidden');
  progressFill.style.width = '0%';

  try {
    const ffmpeg = new FFmpeg();
    await ffmpeg.load({
      coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
      wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
    });

    const buffer = await selectedFile.arrayBuffer();
    const inputExt = selectedFile.name.split('.').pop();
    const inputName = `input.${inputExt}`;
    ffmpeg.writeFile(inputName, new Uint8Array(buffer));

    const mode = modeSelect.value;
    const outExt = outFormat.value;
    const outputName = `output.${outExt}`;
    let args = ['-i', inputName];

    // Кадрирование
    if (mode === 'video') {
      const x = parseInt(cropX.value) || 0;
      const y = parseInt(cropY.value) || 0;
      let w = parseInt(cropW.value) || videoWidth;
      let h = parseInt(cropH.value) || videoHeight;
      if (w > 0 && h > 0) {
        args.push('-vf', `crop=${w}:${h}:${x}:${y}`);
      }
    }

    // Аудио
    const acodec = audioCodec.value;
    const sr = sampleRate.value;
    const abitrate = audioBitrate.value;
    if (acodec !== 'copy') {
      args.push('-c:a', acodec);
      args.push('-ar', sr);
      args.push('-b:a', `${abitrate}k`);
    } else {
      args.push('-c:a', 'copy');
    }

    // Видео
    if (mode === 'video') {
      const videoCodec = formatMap.video[outExt]?.videoCodec || 'libx264';
      args.push('-c:v', videoCodec);
    } else {
      args.push('-vn');
    }

    args.push('-y', outputName);

    status.textContent = '🔄 Обработка...';
    ffmpeg.on('progress', ({ progress }) => {
      const pct = Math.round(progress * 100);
      progressFill.style.width = `${pct}%`;
      status.textContent = `⏳ Конвертация: ${pct}%`;
    });

    await ffmpeg.exec(args);
    const data = await ffmpeg.readFile(outputName);
    const blob = new Blob([data], { type: `video/${outExt}` });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `converted.${outExt}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    ffmpeg.deleteFile(inputName);
    ffmpeg.deleteFile(outputName);
    status.textContent = '✅ Готово! Файл скачан.';
    progressFill.style.width = '100%';
  } catch (err) {
    console.error(err);
    status.textContent = `❌ Ошибка: ${err.message || 'Неизвестная ошибка'}`;
  } finally {
    convertBtn.disabled = false;
    setTimeout(() => {
      progressWrap.classList.add('hidden');
      progressFill.style.width = '0%';
    }, 2000);
  }
});
</script>
</body>
</html>
